version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: scoreme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-scoreme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scoreme}
      POSTGRES_DB: ${DB_NAME:-scoreme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scoreme}"]
      interval: 5s
      retries: 5

  # ── Express API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scoreme-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${DB_USER:-scoreme}:${DB_PASSWORD:-scoreme}@postgres:5432/${DB_NAME:-scoreme}
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: ./uploads
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      MODERATION_ENABLED: ${MODERATION_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"

  # ── Nginx (frontend + reverse proxy) ──
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scoreme-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  uploads:
